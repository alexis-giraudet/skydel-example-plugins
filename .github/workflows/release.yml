name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        required: true
        type: string
        default: 'vXX.YY.ZZ'

env:
  ARTIFACT_NAME: skydel-example-plugins-${{ runner.os }}-${{ runner.arch }}
  CMAKE_BUILD_DIR: ${{ runner.temp }}/build
  CMAKE_INSTALL_DIR: ${{ runner.temp }}/skydel-example-plugins-${{ runner.os }}-${{ runner.arch }}

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
      - name: Install dependencies
        run: |
          sudo apt --yes install uuid-dev
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -D PLUGIN_INSTALL_DIR="${{ env.CMAKE_INSTALL_DIR }}" -B "${{ env.CMAKE_BUILD_DIR }}" .
          cmake --build "${{ env.CMAKE_BUILD_DIR }}" --parallel "$(nproc)"
          cmake --install "${{ env.CMAKE_BUILD_DIR }}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.CMAKE_INSTALL_DIR }}
          retention-days: 1
          overwrite: true


  release:
    needs: [build-ubuntu]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts
      - name: Archive artifacts
        run: |
          cd "${{ runner.temp }}/artifacts"
          find . -mindepth 1 -maxdepth 1 -type d -exec zip -r "{}.zip" "{}" \;
      - name: GitHub release
        run: |
          find "${{ runner.temp }}/artifacts" -mindepth 1 -maxdepth 1 -type f -exec gh release create "${{ inputs.release_tag }}" --generate-notes "{}" +
